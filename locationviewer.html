<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blogsquad</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/locationviewer.css"/>
</head>

<body>

<div id="app">

  <aside id="sidebar">

    <div class="sidebar-header">
      <div class="brand">📍 LocationView</div>
    </div>

    <!-- MODE SWITCH -->
    <div class="mode-switch">
      <button id="mode-places" class="mode-btn active">Places</button>
      <button id="mode-tourist" class="mode-btn">Tourist Spots</button>
    </div>

    <!-- SEARCH -->
    <div class="search-section">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Search any place..."/>
        <button id="search-btn">Go</button>
      </div>
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <!-- TOURIST -->
    <div id="tourist-section" class="tourist-section hidden">
      <h3>Famous Tourist Spots</h3>
      <ul id="tourist-list"></ul>
    </div>

    <!-- SAVED -->
    <div class="saved-section">
      <div>
        <span>Saved Places</span>
        <span id="saved-count" class="badge">0</span>
      </div>
      <ul id="saved-list"></ul>
    </div>

  </aside>

  <!-- MAP -->
  <main id="map-container">
    <div id="map"></div>

    <button id="locate-btn" class="locate-btn">📍</button>

    <!-- INFO PANEL -->
    <div id="info-panel" class="info-panel hidden">
      <h3 id="info-name"></h3>
      <p id="info-address"></p>
      <p id="info-coords"></p>

      <button id="save-btn">Save Place</button>
      <a id="maps-link" target="_blank">Open in Maps</a>
      <button id="info-close">Close</button>
    </div>
  </main>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/locationviewer.js"></script>

</body>
</html>
