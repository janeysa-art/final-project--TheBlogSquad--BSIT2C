<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/profile.js" defer></script>


  <title>blogsquad| Login & Registration</title>

  <!-- Background -->
  <style>
    body {
      background: url("img/l.jpg");
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      overflow: hidden;
    }
  </style>
</head>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<body>

<div class="wrapper">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">
      <p>BlogSquad.</p>
    </div>

    <div class="nav-menu" id="navMenu">
      <ul>
        <li><a href="#" class="link active">Home</a></li>
       <li class="nav-item">
    <a href="services.html" class="link">Services</a>
</li>

<li class="nav-item">
    <a href="aboutpage.html" class="link">About</a>
</li>
      </ul>
    </div>

    <div class="nav-button">
      <button class="btn white-btn" id="loginBtn" onclick="login()">Sign In</button>
      <button class="btn" id="registerBtn" onclick="register()">Register</button>
    </div>

    <div class="nav-menu-btn">
      <i class="bx bx-menu" onclick="myMenuFunction()"></i>
    </div>
  </nav>

  <!-- FORM BOX -->
  <div class="form-box">

    <!-- LOGIN -->
    <div class="login-container" id="login">

      <div class="top">
        <span>Don't have an account? <a href="#" onclick="register()">Sign Up</a></span>
        <header>Login</header>
      </div>

      <div class="input-box">
        <input type="text" id="loginUser" class="input-field" placeholder="Email" />
        <i class="bx bx-user"></i>
      </div>

      <div class="input-box">
        <input type="password" id="loginPass" class="input-field" placeholder="Password" />
        <i class="bx bx-lock-alt"></i>
      </div>

      <div class="input-box">
        <input type="submit" class="submit" value="Sign In" onclick="loginUser()" />
      </div>

    </div>

    <!-- REGISTER -->
    <div class="register-container" id="register">

      <div class="top">
        <span>Have an account? <a href="#" onclick="login()">Login</a></span>
        <header>Register</header>
      </div>

      <div class="two-forms">
        <div class="input-box">
          <input type="text" id="firstName" class="input-field" placeholder="Firstname" />
          <i class="bx bx-user"></i>
        </div>

        <div class="input-box">
          <input type="text" id="lastName" class="input-field" placeholder="Lastname" />
          <i class="bx bx-user"></i>
        </div>
      </div>

      <div class="input-box">
        <input type="text" id="email" class="input-field" placeholder="Email" />
        <i class="bx bx-envelope"></i>
      </div>

      <div class="input-box">
        <input type="password" id="password" class="input-field" placeholder="Password" />
        <i class="bx bx-lock-alt"></i>
      </div>

      <div class="input-box">
        <input type="submit" class="submit" value="Register" onclick="registerUser()" />
      </div>

    </div>

  </div>
</div>


<!-- ================= JAVASCRIPT ================= -->
<script>
function myMenuFunction() {
  document.getElementById("navMenu").classList.toggle("responsive");
}

// SHOW LOGIN
function login() {
  document.getElementById("login").style.left = "4px";
  document.getElementById("register").style.right = "-520px";
}

// SHOW REGISTER
function register() {
  document.getElementById("login").style.left = "-510px";
  document.getElementById("register").style.right = "5px";
}

// ================= REGISTER =================
function registerUser() {
    const first = document.getElementById("firstName").value;
    const last = document.getElementById("lastName").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    if (!first || !email || !pass) {
        alert("Please fill all fields");
        return;
    }

    // Combine names for the display name
    const fullName = `${first} ${last}`;

    // We save it as 'userPreferences' so index.html and profile.html recognize it immediately
    const userPrefs = {
        name: fullName,
        email: email,
        password: pass,
        avatar: "img/usl.jpg", // Default avatar
        theme: "Light",        // Default theme
        fontSize: "16"         // Default font size
    };

    localStorage.setItem("userPreferences", JSON.stringify(userPrefs));

    alert("Registration Successful! Welcome, " + first);
    window.location.href= "homepage.html";
}

// ================= LOGIN =================
function loginUser() {
    const loginInput = document.getElementById("loginUser").value;
    const pass = document.getElementById("loginPass").value;

    const saved = JSON.parse(localStorage.getItem("userPreferences"));

    if (!saved) {
        alert("No account found. Please register first.");
        return;
    }

    // Check if input matches saved email OR saved name
    if (!saved) {
    alert("No account found. Please sign up first.");
    return;
}

const emailMatch = loginInput === saved.email;
const passwordMatch = pass === saved.password;

if (emailMatch && passwordMatch) {
    window.location.href = "homepage.html";
} else {
    alert("Incorrect email or password");
}

}
</script>

</body>
</html>
