<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdminHub</title>

<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="dashboard.css">
<script src="dashboard.js" defer></script>
</head>

<body>

<!-- SIDEBAR -->
<section id="sidebar">
    <a href="#" class="brand">
        <i class='bx bxs-smile'></i>
        <span class="text">Blogsquad</span>
    </a>

    <ul class="side-menu top">
        <li class="active"><a href="#"><i class='bx bxs-dashboard'></i><span class="text">Dashboard</span></a></li>
        <li><a href="index.html"><i class='bx bx-home-alt'></i><span class="text">Home</span></a></li>
        <li><a href="profile.html"><i class='bx bxs-doughnut-chart'></i><span class="text">Info</span></a></li>
        <li><a href="messages.html"><i class='bx bxs-message-dots'></i><span class="text">Message</span></a></li>
        <li><a href="team.html"><i class='bx bxs-group'></i><span class="text">Team</span></a></li>
    </ul>

    <ul class="side-menu">
        <li><a href="#"><i class='bx bxs-cog'></i><span class="text">Settings</span></a></li>
        <li><a href="login.html" class="logout"><i class='bx bxs-log-out-circle'></i><span class="text">Logout</span></a></li>
    </ul>
</section>

<!-- CONTENT -->
<section id="content">

<!-- NAV -->
<nav>
    <i class='bx bx-menu'></i>

    <a href="#" class="nav-link">Categories</a>

    <form>
        <div class="form-input">
            <input type="search" placeholder="Search...">
            <button><i class='bx bx-search'></i></button>
        </div>
    </form>

    <!-- DARK MODE -->
    <input type="checkbox" id="switch-mode" hidden>
    <label for="switch-mode" class="switch-mode"></label>

    <!-- NOTIFICATION -->
    <div class="notification">
        <i class='bx bxs-bell'></i>
        <span class="num">0</span>
        <ul id="notification-list" class="notification-dropdown"></ul>
    </div>

    <div class="profile">
        <img src="usl.jpg" alt="profile">
    </div>
</nav>

<!-- MAIN -->
<main>

<div class="head-title">
    <div class="left">
        <h1>Dashboard</h1>
    </div>
</div>

<!-- BOX INFO -->
<ul class="box-info">
    <li><i class='bx bxs-calendar-check'></i><span><h3>5</h3><p>Checklist</p></span></li>
    <li><i class='bx bxs-group'></i><span><h3>5</h3><p>Visitors</p></span></li>
    <li><i class='bx bx-message-square-detail'></i><span><h3>3</h3><p>Total Posts</p></span></li>
</ul>

<!-- TABLE + TODO SECTION -->
<div class="table-data">

    <!-- TODO LIST -->
    <div class="order">
        <div class="head">
            <h3>Todo's</h3>
            <i class='bx bx-search'></i>
            <i class='bx bx-filter'></i>
        </div>

        <!-- ADD TODO BUTTON -->
        <button id="add-todo">+ Add Task</button>

        <!-- TODO LIST -->
        <ul class="todo-list"></ul>
    </div>

    <!-- SAMPLE TABLE -->
    <div class="order">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>
                        <img src="usl.jpg">
                        <p>Anna Smith</p>
                    </td>
                    <td>01-10-2021</td>
                    <td><span class="status completed">Completed</span></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</main>
</section>

</body>
</html>
